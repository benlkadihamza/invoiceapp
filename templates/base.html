<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Générateur de Factures{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>

        <div class="nav-inner">
            <a href="/" class="nav-brand">Cocina Espa&ntilde;ola</a>
            <div class="nav-links">
                <a href="/">Accueil</a>
                <a href="/invoices">Factures</a>
                <a href="/change-password">Changer mot de passe</a>
                <a href="/logout">D&eacute;connexion</a>
            </div>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
